<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <aside class="sidebar">
    <h2>Finance Dashboard</h2>
    <ul>
      <li>🏠 Overview</li>
      <li>💰 Income</li>
      <li>💸 Expenses</li>
      <li>📈 Savings</li>
    </ul>
  </aside>

  <main class="main-content">
    <header>
      <h1>Financial Overview</h1>
      <button id="refresh">Refresh</button>
    </header>

    <section class="cards">
      <div class="card">
        <h3>Total Income</h3>
        <p id="income">$12,500</p>
      </div>
      <div class="card">
        <h3>Total Expenses</h3>
        <p id="expenses">$8,200</p>
      </div>
      <div class="card">
        <h3>Savings</h3>
        <p id="savings">$4,300</p>
      </div>
    </section>

    <section class="chart">
      <canvas id="financeChart"></canvas>
    </section>

    <section class="table">
      <h2>Recent Transactions</h2>
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Description</th>
            <th>Amount</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>2026-07-01</td>
            <td>Salary</td>
            <td>+$3,000</td>
          </tr>
          <tr>
            <td>2026-07-02</td>
            <td>Rent</td>
            <td>-$1,200</td>
          </tr>
          <tr>
            <td>2026-07-03</td>
            <td>Groceries</td>
            <td>-$250</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>
</body>
</html>
